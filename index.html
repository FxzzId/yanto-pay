<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YANTO PAY - Top Up DANA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a1f2c 0%, #05161f 100%);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 580px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(115deg, #0e3b5e, #0b2c44);
            padding: 32px 28px;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 800;
        }
        .header p {
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
        }
        .dana-badge {
            background: rgba(255,255,255,0.12);
            border-radius: 100px;
            padding: 6px 18px;
            display: inline-block;
            margin-top: 14px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
        }
        .content {
            padding: 28px 24px;
        }
        .info-card {
            background: #f0f6fe;
            border-radius: 28px;
            padding: 14px 20px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .dana-number {
            font-size: 1.2rem;
            font-weight: 800;
            color: #0e3b5e;
            background: white;
            padding: 6px 16px;
            border-radius: 60px;
            font-family: monospace;
        }
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .amount-btn {
            background: #f2f5f9;
            border: 1.5px solid #e2e8f0;
            padding: 14px 6px;
            border-radius: 48px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .amount-btn.active {
            background: #0e3b5e;
            border-color: #0e3b5e;
            color: white;
        }
        .custom-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.95rem;
            outline: none;
            text-align: center;
        }
        .pay-btn {
            width: 100%;
            background: linear-gradient(105deg, #0e3b5e, #0a2c44);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            margin: 20px 0;
        }
        .qr-wrapper {
            text-align: center;
            border: 2px solid #eef2f8;
            border-radius: 32px;
            padding: 24px;
            margin-top: 12px;
        }
        .qr-image {
            max-width: 260px;
            width: 100%;
            margin: 0 auto;
            display: block;
        }
        .status-text {
            font-size: 0.75rem;
            color: #3b6e9e;
            margin-top: 12px;
        }
        .loading {
            color: #0e3b5e;
            font-weight: 600;
            padding: 16px;
            text-align: center;
        }
        .footer {
            background: #f9fbfd;
            padding: 18px;
            text-align: center;
            font-size: 0.7rem;
            color: #7f9cbb;
            border-top: 1px solid #eef2f8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>YANTO PAY</h1>
        <p>Top Up DANA • QRIS Otomatis</p>
        <div class="dana-badge">📱 DANA tujuan : 0896-7604-1776</div>
    </div>
    <div class="content">
        <div class="info-card">
            <span>✅ Nomor penerima</span>
            <span class="dana-number">0896-7604-1776</span>
        </div>

        <div class="amount-grid" id="amountGrid">
            <div class="amount-btn" data-amount="10000">Rp 10.000</div>
            <div class="amount-btn" data-amount="20000">Rp 20.000</div>
            <div class="amount-btn" data-amount="50000">Rp 50.000</div>
            <div class="amount-btn" data-amount="100000">Rp 100.000</div>
            <div class="amount-btn" data-amount="250000">Rp 250.000</div>
            <div class="amount-btn" data-amount="500000">Rp 500.000</div>
        </div>
        <input type="text" id="customAmount" class="custom-input" placeholder="atau nominal lain (min 10.000)">

        <button id="generateBtn" class="pay-btn">💸 GENERATE QRIS</button>

        <div id="qrContainer" class="qr-wrapper" style="display: none;">
            <img id="qrImage" class="qr-image" src="" alt="QRIS">
            <div class="status-text" id="qrStatus"></div>
        </div>
        <div id="loading" class="loading" style="display: none;">⏳ Memuat QRIS...</div>
    </div>
    <div class="footer">© 2025 YANTO PAY • QRIS langsung dari hotelmurah.com</div>
</div>

<script>
    const DANA_NUMBER = "089676041776";
    const API_URL = "/api/qris";

    let selectedAmount = 50000;
    const amountBtns = document.querySelectorAll('.amount-btn');
    const customInput = document.getElementById('customAmount');
    const generateBtn = document.getElementById('generateBtn');
    const qrContainer = document.getElementById('qrContainer');
    const qrImage = document.getElementById('qrImage');
    const qrStatus = document.getElementById('qrStatus');
    const loadingDiv = document.getElementById('loading');

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID').format(angka);
    }

    function updateActiveButton(amount) {
        amountBtns.forEach(btn => {
            const btnAmount = parseInt(btn.getAttribute('data-amount'));
            if (btnAmount === amount) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function getSelectedAmount() {
        let raw = customInput.value.trim();
        if (raw !== "") {
            let val = parseInt(raw.replace(/\D/g, ''));
            if (!isNaN(val) && val >= 10000) return val;
        }
        return selectedAmount;
    }

    async function generateQRIS(amount) {
        if (amount < 10000) {
            alert("Minimal nominal Rp 10.000");
            return false;
        }

        loadingDiv.style.display = 'block';
        qrContainer.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}?amount=${amount}&phone=${DANA_NUMBER}`);
            const data = await response.json();

            if (data.success && data.qrUrl) {
                qrImage.src = data.qrUrl;
                qrStatus.innerHTML = `✅ Scan QRIS dengan DANA / GoPay / OVO. Bayar Rp ${formatRupiah(amount)} ke DANA ${DANA_NUMBER}. Uang langsung masuk.`;
                qrContainer.style.display = 'block';
            } else {
                throw new Error('Gagal mendapatkan QRIS');
            }
        } catch (error) {
            alert('Gagal generate QRIS. Coba lagi nanti.');
            console.error(error);
        } finally {
            loadingDiv.style.display = 'none';
        }
    }

    amountBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            selectedAmount = parseInt(btn.getAttribute('data-amount'));
            customInput.value = '';
            updateActiveButton(selectedAmount);
        });
    });

    customInput.addEventListener('input', () => {
        let raw = customInput.value.replace(/\D/g, '');
        if (raw) {
            let num = parseInt(raw);
            if (!isNaN(num)) {
                selectedAmount = num;
                updateActiveButton(null);
            }
        }
    });

    generateBtn.addEventListener('click', () => {
        let amount = getSelectedAmount();
        generateQRIS(amount);
    });

    updateActiveButton(50000);
    selectedAmount = 50000;
</script>
</body>
  </html>
